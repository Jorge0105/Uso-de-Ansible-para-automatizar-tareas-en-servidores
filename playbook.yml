- name: Configurar servidores
  hosts: servers
  become: true

  tasks:
    - name: Actualizar paquetes
      apt:
        update_cache: yes

    - name: Crear usuario itla
      user:
        name: itla
        state: present

    - name: Crear carpeta app
      file:
        path: /home/ansible/app
        state: directory

    - name: Crear archivo hola.txt
      copy:
        dest: /home/ansible/app/hola.txt
        content: "Hola desde Ansible 🚀"

    - name: Instalar cowsay y htop
      apt:
        name:
          - cowsay
          - htop
        state: present
